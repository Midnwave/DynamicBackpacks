name: Dev Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew shadowJar --no-daemon -PpluginBuild=${{ github.run_number }}

      - name: Rename jar
        run: |
          JAR=$(find build/libs -name "*.jar" ! -name "*-sources*" ! -name "*-plain*" | head -1)
          cp "$JAR" "DynamicBackpacks-dev${{ github.run_number }}.jar"

      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }}"
          prerelease: true
          files: DynamicBackpacks-dev${{ github.run_number }}.jar
          body: |
            Automated dev build from commit ${{ github.sha }}
