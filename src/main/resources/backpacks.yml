# DynamicBackpacks - Tier Configuration
#
# Each tier defines:
#   rows          - inventory rows (1-6). 1 row = 9 slots, 6 rows = 54 slots
#   display-name  - item display name (supports & color codes)
#   texture       - Base64 skin texture value for the player head
#                   Get values from https://minecraft-heads.com
#                   Click a head → "Minecraft URL" tab → copy the "Value" field
#   crafting:
#     enabled     - whether this tier's recipe is active
#     shape       - 3-line crafting grid (each string is one row, 3 chars wide)
#     ingredients - map of single characters to material names or TIER_N_BACKPACK
#
# Special ingredient key: TIER_N_BACKPACK (e.g. TIER_1_BACKPACK)
# This requires a backpack of that tier to be in that crafting slot.

tiers:
  1:
    rows: 1
    display-name: '&6Tier 1 Backpack'
