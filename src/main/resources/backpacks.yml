#   crafting:
#     enabled     - whether this tier's recipe is active
#     shape       - 3-line crafting grid (3 chars wide each)
#     ingredients - character -> material or TIER_N_BACKPACK
#   loot:
#     <location>:
#       enabled   - whether this backpack can spawn here
