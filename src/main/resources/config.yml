config-version: 1

# Plugin mode:
#   both    - item backpacks AND command backpacks are enabled (default)
#   item    - only physical item backpacks are enabled
#   command - only command backpacks (/bp <id>) are enabled
#   off     - all backpack functionality is disabled
mode: both

# Database settings
database:
  file: backpacks.db

# Command backpacks (/bp <id>)
command-backpacks:
  # Default tier for all command backpack slots (1-6)
  default-tier: 6

# Loot chest settings
loot:
  # Set to true to allow backpacks to spawn in structure loot chests.
  # Configure per-tier chances in backpacks.yml under each tier's 'loot:' section.
  enabled: false
